name: PR checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package extension
        run: npm run package:extension

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          retention-days: 7
          path: |
            dist/
            artifacts/bookmarks-focus.zip
